<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>卖车指南</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="卖车指南——专注为车主提供二手车卖车攻略、估价技巧、过户流程及防坑指南，帮你卖得省心、卖得划算。">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <!-- <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" /> -->
  <!-- <link rel="icon" type="image/svg+xml" href="/favicon.svg" /> -->
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
  <style> 
    :root {
      /* 主色 - 砖橘/赤陶色 */
      --theme-color: #C4521A;
      --theme-color-hover: #A84416;
      --theme-color-disabled: #D9905A;

      /* 文字色 - 蓝灰系 */
      --text-title: #2D4A6A;
      --text-body: #4A6280;

      /* 背景色 */
      --bg-page: #FFFFFF;
      --bg-sidebar: #FFF8F2;
      --bg-cover: #FFF1E6;
    }

    /* 文档背景 - 白色 */
    body {
      background-color: var(--bg-page);
    }

    .markdown-section {
      background-color: var(--bg-page);
    }

    /* 侧边栏背景 - 极浅暖白 */
    .sidebar {
      background-color: var(--bg-sidebar);
    }

    /* 侧边栏导航激活/悬停状态 */
    .sidebar-nav .active>a,
    .sidebar-nav a:hover {
      color: var(--theme-color) !important;
    }

    /* 标题文字 - 深蓝灰 */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6 {
      color: var(--text-title) !important;
    }

    /* 正文文字 */
    .markdown-section p,
    .markdown-section li,
    .markdown-section td,
    .markdown-section th {
      color: var(--text-body);
    }

    /* 顶部导航链接 */
    .app-nav li a:hover,
    .app-nav li a.active {
      color: var(--theme-color) !important;
      border-color: var(--theme-color) !important;
    }

    /* 链接颜色 */
    .markdown-section a {
      color: var(--theme-color);
    }

    .markdown-section a:hover {
      color: var(--theme-color-hover);
    }

    /* ========== 封面页样式 ========== */
    /* 封面页背景 - 覆盖 Docsify 动态内联渐变背景 */
    section.cover.show {
      background:
        linear-gradient(rgba(255, 241, 230, 0.72), rgba(255, 241, 230, 0.72)),
        url('images/cover-bg.jpg') !important;
      background-size: cover !important;
      background-position: center !important;
      background-repeat: no-repeat !important;
    }

    /* 封面标题 - 深蓝灰 */
    .cover h1,
    .cover h2,
    .cover h3 {
      color: var(--text-title) !important;
    }

    /* 去掉封面标题内 Docsify 自动生成的 anchor 链接样式 */
    .cover h1 a.anchor,
    .cover h2 a.anchor,
    .cover h3 a.anchor {
      color: var(--text-title) !important;
      text-decoration: none !important;
      pointer-events: none !important;
      cursor: default !important;
    }

    /* 去掉 anchor 链接内的 span 底部边框（Docsify 默认样式） */
    .cover h1 a.anchor span,
    .cover h2 a.anchor span,
    .cover h3 a.anchor span {
      border-bottom: none !important;
    }

    /* 封面副标题/描述 */
    .cover p {
      color: var(--text-body) !important;
    }

    /* 主按钮（实心）- 砖橘底色 + 白字 + 胶囊圆角 */
    .cover .btn-primary,
    .cover a.btn-primary {
      color: #FFFFFF !important;
      background-color: var(--theme-color) !important;
      border: none !important;
      border-radius: 999px !important;
      padding: 12px 30px;
      margin: 0 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .cover .btn-primary:hover,
    .cover a.btn-primary:hover {
      background-color: var(--theme-color-hover) !important;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(196, 82, 26, 0.4);
    }

    /* 次按钮（描边）- 透明底 + 砖橘边框 + 砖橘字 */
    .cover .btn-secondary,
    .cover a.btn-secondary {
      color: var(--theme-color) !important;
      background-color: transparent !important;
      border: 1.5px solid var(--theme-color) !important;
      border-radius: 999px !important;
      padding: 12px 30px;
      margin: 0 8px;
      text-decoration: none;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .cover .btn-secondary:hover,
    .cover a.btn-secondary:hover {
      background-color: var(--theme-color) !important;
      color: #FFFFFF !important;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(196, 82, 26, 0.4);
    }

    /* 封面页按钮通用样式（兼容没有 btn-primary/btn-secondary 类的情况） */
    .cover button,
    .cover a {
      border-radius: 999px !important;
    }

    /* ========== 侧边栏折叠插件样式 ========== */
    .sidebar-collapse-section {
      cursor: pointer;
    }

    .sidebar-collapse-section::before {
      content: '▶';
      display: inline-block;
      margin-right: 6px;
      transition: transform 0.2s;
      font-size: 10px;
    }

    .sidebar-collapse-section.open::before {
      transform: rotate(90deg);
    }

    /* ========== 全文复制按钮样式 ========== */
    .copy-all-btn {
      background: var(--theme-color);
      color: #FFFFFF;
      border: none;
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      opacity: 0.85;
      transition: all 0.2s;
    }

    .copy-all-btn:hover {
      opacity: 1;
      background: var(--theme-color-hover);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(196, 82, 26, 0.4);
    }

    .copy-all-btn.copied {
      background: #52c41a;
    }

    /* ========== 字数和按钮容器 ========== */
    .page-tools {
      position: fixed;
      top: 60px;
      right: 30px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    /* ========== 字数统计样式 ========== */
    .word-count {
      color: var(--text-body);
      font-size: 13px;
      cursor: default;
      opacity: 0.7;
    }

    /* ========== 封面页版本号 ========== */
    .cover-version {
      position: fixed;
      right: 30px;
      bottom: 30px;
      z-index: 100;
      color: var(--text-body);
      font-size: 14px;
      opacity: 0.6;
      display: none;
    }
  </style>
</head>

<body>
  <div id="app"></div>
  <div class="cover-version">v3.0</div>
  <script>
    window.$docsify = {
      name: '卖车指南',
      repo: '',
      coverpage: true,
      onlyCover: true,
      loadSidebar: '_sidebar.md',
      subMaxLevel: 1,
      sidebarCollapse: true,
      alias: {
        '/.*/_sidebar.md': '/_sidebar.md',
        '/.*/_navbar.md': '/_navbar.md',
      },
      copyCode: {
        buttonText: '复制',
        errorText: '复制失败',
        successText: '已复制',
      },
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <!-- 侧边栏折叠插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-sidebar-collapse/dist/docsify-sidebar-collapse.min.js"></script>
  <!-- 一键复制代码插件 -->
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  <!-- 全文复制按钮和字数统计 -->
  <script>
    // 获取或创建工具栏容器
    function getOrCreateToolsContainer() {
      var container = document.querySelector('.page-tools');
      if (container) return container;
      
      container = document.createElement('div');
      container.className = 'page-tools';
      document.body.appendChild(container);
      return container;
    }

    // 显示或隐藏工具栏
    function toggleToolsContainer(show) {
      var container = document.querySelector('.page-tools');
      if (container) {
        container.style.display = show ? '' : 'none';
      }
    }

    // 统计当前文档字数（简单字符统计：每个字符算一个）
    function updateWordCount(container) {
      var content = document.querySelector('.markdown-section');
      if (!content) return;

      // 获取纯文本，去掉换行符，统计所有字符（包括空格）
      var text = (content.innerText || content.textContent).replace(/[\n\r]/g, '');
      var totalCount = text.length;

      // 创建或更新字数显示
      var existing = container.querySelector('.word-count');
      if (existing) {
        existing.textContent = '字数: ' + totalCount;
        return;
      }
      var countDiv = document.createElement('div');
      countDiv.className = 'word-count';
      countDiv.textContent = '字数: ' + totalCount;
      container.insertBefore(countDiv, container.firstChild);
    }

    // 插入「复制全文」按钮
    function insertCopyAllBtn(container) {
      var existing = container.querySelector('.copy-all-btn');
      if (existing) { return; }
      var btn = document.createElement('button');
      btn.className = 'copy-all-btn';
      btn.textContent = '复制全文';
      btn.onclick = function () {
        var content = document.querySelector('.markdown-section');
        if (!content) return;
        // 获取纯文本（去掉 HTML 标签）
        var text = content.innerText || content.textContent;
        navigator.clipboard.writeText(text).then(function () {
          btn.textContent = '已复制';
          btn.classList.add('copied');
          setTimeout(function () {
            btn.textContent = '复制全文';
            btn.classList.remove('copied');
          }, 1500);
        });
      };
      container.appendChild(btn);
    }

    // 更新版本号显示
    function updateVersionDisplay() {
      var versionEl = document.querySelector('.cover-version');
      if (!versionEl) return;
      
      var isCoverPage = document.querySelector('section.cover.show') !== null;
      versionEl.style.display = isCoverPage ? 'block' : 'none';
    }

    // 更新所有信息（字数和按钮）
    function updatePageInfo() {
      var container = getOrCreateToolsContainer();
      
      // 统一判断是否是封面页
      var isCoverPage = document.querySelector('section.cover.show') !== null;
      
      // 更新版本号显示
      updateVersionDisplay();
      
      if (isCoverPage) {
        // 封面页：隐藏工具栏
        toggleToolsContainer(false);
        return;
      }
      
      // 文档页：显示工具栏，更新字数和按钮
      toggleToolsContainer(true);
      updateWordCount(container);
      insertCopyAllBtn(container);
    }

    // 使用 Docsify 的 doneEach 钩子，每次页面切换后执行
    window.$docsify.hooks = window.$docsify.hooks || {};
    window.$docsify.hooks.doneEach = function() {
      // 延迟执行，确保 DOM 已更新
      setTimeout(updatePageInfo, 100);
    };

    // 备用：监听 Docsify 的内容渲染完成事件
    window.addEventListener('docsify:rendered', function() {
      setTimeout(updatePageInfo, 100);
    });
    
    // 监听 hash 变化（处理浏览器前进后退）
    window.addEventListener('hashchange', function() {
      setTimeout(updatePageInfo, 100);
    });

    // 初次加载
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(updatePageInfo, 500);
    });
  </script>
</body>

</html>
